    <script>
        const body = document.body;
        body.addEventListener('mousemove', (event) => {
            const dot = document.createElement('div');
            dot.className = 'cursor-droplet';
            dot.style.left = event.clientX + 'px';
            dot.style.top = event.clientY + 'px';

            document.body.appendChild(dot);
            setTimeout(() => dot.remove(), 600);
        });

        // Floating anti-gravity lines
        const gravity = (x, y, vx, vy) => {
            const d = Math.sqrt(x * x + y * y);
            const force = Math.min(11 / (d + 25), 0.12);
            const angle = Math.atan2(y, x);
            return {
                x: vx - force * Math.cos(angle),
                y: vy - force * Math.sin(angle),
            };
        };

        let particles = [];

        function createParticle(e){
            const p = document.createElement('div');
            p.className = 'cursor-droplet';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            p.dataset.vx = (Math.random() - 0.5) * 1.2;
            p.dataset.vy = (Math.random() - 0.5) * 1.2;
            p.dataset.life = 40;
            document.body.appendChild(p);
            particles.push(p);
        }

        window.addEventListener('mousemove', (e) => createParticle(e));

        function animateParticles(){
            particles = particles.filter(p => {
                let vx = Number(p.dataset.vx);
                let vy = Number(p.dataset.vy);
                const rect = p.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2 - window.innerWidth / 2;
                const centerY = rect.top + rect.height / 2 - window.innerHeight / 2;

                ({x: vx, y: vy} = gravity(centerX, centerY, vx, vy));
                p.dataset.vx = vx;
                p.dataset.vy = vy;

                p.style.left = (rect.left + vx) + 'px';
                p.style.top = (rect.top + vy) + 'px';

                let life = Number(p.dataset.life) - 1;
                p.dataset.life = life;
                if (life <= 0){
                    p.remove();
                    return false;
                }
                return true;
            });
            requestAnimationFrame(animateParticles);
        }

        requestAnimationFrame(animateParticles);
    </script>
    <script>
        const typewriterElement = document.getElementById('typewriter');
        const text = 'PHILEMON SAMUEL';
        let index = 0;
        let isDeleting = false;
        const typingSpeed = 150;
        const deletingSpeed = 100;
        const pauseTime = 2000;

        function typeWriter() {
            if (!isDeleting) {
                typewriterElement.textContent = text.substring(0, index + 1);
                index++;
                if (index === text.length) {
                    isDeleting = true;
                    setTimeout(typeWriter, pauseTime);
                    return;
                }
            } else {
                typewriterElement.textContent = text.substring(0, index);
                index--;
                if (index === 0) {
                    isDeleting = false;
                }
            }
            setTimeout(typeWriter, isDeleting ? deletingSpeed : typingSpeed);
        }

        typeWriter();
    </script>
